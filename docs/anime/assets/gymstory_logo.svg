<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1180 640" width="1180" height="640" font-family="'Arial Rounded MT Bold','Baloo 2',Nunito,'Hiragino Maru Gothic Pro','Rounded Mplus 1c',system-ui,sans-serif">
  <defs>
    <!-- soft background -->
    <radialGradient id="bg" cx="50%" cy="38%" r="75%">
      <stop offset="0%" stop-color="#fff7f1"/>
      <stop offset="100%" stop-color="#ffe6ef"/>
    </radialGradient>
    <!-- candy body fill: light top -> saturated bottom -->
    <linearGradient id="candy" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"  stop-color="#ffe6f0"/>
      <stop offset="45%" stop-color="#ffb2d1"/>
      <stop offset="100%" stop-color="#ff8ebd"/>
    </linearGradient>
    <!-- glossy top highlight -->
    <linearGradient id="gloss" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#ffffff" stop-opacity="0.95"/>
      <stop offset="34%"  stop-color="#ffffff" stop-opacity="0.35"/>
      <stop offset="48%"  stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <!-- drop candy gradients -->
    <radialGradient id="dPink" cx="38%" cy="32%" r="75%">
      <stop offset="0%" stop-color="#ffd9e8"/><stop offset="100%" stop-color="#ff8fbe"/>
    </radialGradient>
    <radialGradient id="dMint" cx="38%" cy="32%" r="75%">
      <stop offset="0%" stop-color="#e2fbf1"/><stop offset="100%" stop-color="#8fe0c4"/>
    </radialGradient>
    <radialGradient id="dLemon" cx="38%" cy="32%" r="75%">
      <stop offset="0%" stop-color="#fff5cf"/><stop offset="100%" stop-color="#ffd15e"/>
    </radialGradient>
    <radialGradient id="dLav" cx="38%" cy="32%" r="75%">
      <stop offset="0%" stop-color="#efe8ff"/><stop offset="100%" stop-color="#c3aef0"/>
    </radialGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#e97fae" flood-opacity="0.35"/>
    </filter>
    <filter id="softsm" x="-40%" y="-40%" width="180%" height="180%">
      <feDropShadow dx="0" dy="4" stdDeviation="4" flood-color="#e97fae" flood-opacity="0.35"/>
    </filter>
  </defs>

  <!-- background card -->
  <rect x="16" y="16" width="1148" height="608" rx="52" fill="url(#bg)"/>

  <!-- scattered bonbon candy drops (die-cut white outline + gloss) -->
  <g filter="url(#softsm)">
    <g>
      <circle cx="132" cy="150" r="40" fill="url(#dMint)" stroke="#ffffff" stroke-width="9"/>
      <ellipse cx="120" cy="136" rx="15" ry="10" fill="#ffffff" opacity="0.75"/>
    </g>
    <g>
      <circle cx="1052" cy="126" r="34" fill="url(#dLemon)" stroke="#ffffff" stroke-width="9"/>
      <ellipse cx="1042" cy="115" rx="12" ry="8" fill="#ffffff" opacity="0.8"/>
    </g>
    <g>
      <circle cx="1064" cy="500" r="44" fill="url(#dPink)" stroke="#ffffff" stroke-width="9"/>
      <ellipse cx="1050" cy="484" rx="16" ry="11" fill="#ffffff" opacity="0.75"/>
    </g>
    <g>
      <circle cx="120" cy="486" r="30" fill="url(#dLav)" stroke="#ffffff" stroke-width="9"/>
      <ellipse cx="111" cy="477" rx="11" ry="7" fill="#ffffff" opacity="0.8"/>
    </g>
  </g>

  <!-- WORDMARK: layered strokes = puffy candy sticker -->
  <g>
    <!-- white die-cut rim (with shadow) -->
    <text x="590" y="352" text-anchor="middle" font-size="176" font-weight="900"
          letter-spacing="2" fill="none" stroke="#ffffff" stroke-width="40"
          stroke-linejoin="round" stroke-linecap="round" filter="url(#soft)">GYMSTORY</text>
    <!-- pink candy edge -->
    <text x="590" y="352" text-anchor="middle" font-size="176" font-weight="900"
          letter-spacing="2" fill="none" stroke="#ef6ea0" stroke-width="16"
          stroke-linejoin="round" stroke-linecap="round">GYMSTORY</text>
    <!-- candy body -->
    <text x="590" y="352" text-anchor="middle" font-size="176" font-weight="900"
          letter-spacing="2" fill="url(#candy)">GYMSTORY</text>
    <!-- glossy top -->
    <text x="590" y="352" text-anchor="middle" font-size="176" font-weight="900"
          letter-spacing="2" fill="url(#gloss)">GYMSTORY</text>
  </g>

  <!-- little heart accent -->
  <g transform="translate(590,430)" filter="url(#softsm)">
    <path d="M0,14 C-12,-4 -34,-2 -34,16 C-34,32 -12,44 0,54 C12,44 34,32 34,16 C34,-2 12,-4 0,14 Z"
          fill="url(#dPink)" stroke="#ffffff" stroke-width="7"/>
    <ellipse cx="-12" cy="18" rx="7" ry="5" fill="#ffffff" opacity="0.8"/>
  </g>

  <!-- tagline ribbon -->
  <g transform="translate(590,520)">
    <rect x="-250" y="-34" width="500" height="66" rx="33" fill="#ffffff" opacity="0.92" filter="url(#softsm)"/>
    <text x="0" y="12" text-anchor="middle" font-size="38" font-weight="800"
          letter-spacing="6" fill="#ef6ea0"
          font-family="'Hiragino Maru Gothic Pro','Rounded Mplus 1c','Baloo 2',sans-serif">やさしいつよさの ものがたり</text>
  </g>

  <!-- presents line -->
  <text x="590" y="120" text-anchor="middle" font-size="30" font-weight="800"
        letter-spacing="8" fill="#f39abe" fill-opacity="0.95">FLAT UP GYM presents</text>
</svg>
